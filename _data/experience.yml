    Support and maintain the hardware and software infrastructure, 2,000 stations (Dell, Lenovo, IBM) and 100 network servers (Dell/IBM/Virtual) (Microsoft operating system). Identify and evaluate potential threats and vulnerabilities in the data network. Report the risks identified and present plans for corrections or mitigation of risks. Develop manuals and procedures to make all network users aware of the importance of Security Policies. Monitor threats in real time. Implement security controls. Examine and evaluate security incidents. Access Control for directories and network users. (Active Directory). Restructure the access permissions allowing the identification of each access and the limitation of reach to what is necessary. Prepare and monitor the data backup and restore routine (Backup Exec - Veritas, Backup Azure). Elaborate the Company's Information Security Policy, including standards, terms, manuals and policies, business continuity plan, contingency plans and disaster recovery. Troubleshooting staggered by technical support. (ManageEngine ServiceDesk Plus). Lead and monitor the execution of projects and services together with third parties. Respond by the company's technology team in the absence of the Coordinator.

